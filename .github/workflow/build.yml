name: FRESH BUILD - NO CACHE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🗑️ DELETE ENTIRE MAVEN CACHE
        run: |
          rm -rf ~/.m2/repository
          mkdir -p ~/.m2/repository
          echo "✅ Maven cache completely wiped!"

      - name: 🔍 CHECK FILES BEFORE COMPILE
        run: |
          echo "=== CHECKING FruitRegistry.java ==="
          cat src/main/java/com/example/fruits/registry/FruitRegistry.java | grep -n "BANANA" || echo "✅ No BANANA found"
          cat src/main/java/com/example/fruits/registry/FruitRegistry.java | grep -n "ORANGE" || echo "✅ No ORANGE found"
          
          echo "=== CHECKING AdminGUIListener.java ==="
          cat src/main/java/com/example/fruits/gui/AdminGUIListener.java | grep -n "AdminGUI.Holder" || echo "✅ No AdminGUI.Holder found"

      - name: 🛠️ COMPILE WITH FRESH CACHE
        run: |
          mvn -B clean compile --file pom.xml -Dmaven.repo.local=~/.m2/repository

      - name: 📦 PACKAGE
        run: mvn -B package --file pom.xml

      - name: 📤 UPLOAD
        uses: actions/upload-artifact@v4
        with:
          name: FruitsPlugin-FRESH
          path: target/*.jar
