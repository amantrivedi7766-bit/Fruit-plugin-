name: Build and Test FruitsPlugin

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear Maven cache'
        type: boolean
        required: false
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Verify files
        run: |
          echo "=== CHECKING FILES ==="
          echo "FruitRegistry.java content:"
          cat src/main/java/com/example/fruits/registry/FruitRegistry.java | grep -A 2 "moon_crescent" || echo "File not found or different"
          echo ""
          echo "AdminGUI.java content:"
          cat src/main/java/com/example/fruits/gui/AdminGUI.java | grep -A 5 "GUIHolder" || echo "File not found or different"

      - name: 🗑️ Clear Maven cache (if requested)
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: |
          rm -rf ~/.m2/repository/com/example
          rm -rf ~/.m2/repository/io/papermc

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🛠️ Clean compile
        run: |
          mvn -B clean compile --file pom.xml
        continue-on-error: false

      - name: 📦 Package plugin
        run: mvn -B package --file pom.xml

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FruitsPlugin-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error
