name: Build and Test FruitsPlugin

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manual trigger

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ 21 ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Verify Java and Maven
        run: |
          java -version
          mvn -version

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🛠️ Build with Maven (clean package)
        run: mvn -B clean package --file pom.xml

      - name: 📂 List target directory
        run: ls -la target/
        shell: bash

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FruitsPlugin-${{ runner.os }}-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.jar
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ✅ Automated build of FruitsPlugin
            - ✅ Supports Paper 1.21.4 – 1.21.11
            - ✅ 10 magical fruits with unique abilities
            - ✅ Admin GUI and cooldown system
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
