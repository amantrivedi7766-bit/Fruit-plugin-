name: Build FruitsPlugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear all caches'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🗑️ CLEAR ALL CACHES
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: |
          rm -rf ~/.m2/repository/com/example
          rm -rf ~/.m2/repository/io/papermc
          rm -rf ~/.m2/repository/org/bukkit
          echo "✅ Cache cleared!"

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔍 Verify Files
        run: |
          echo "=== CHECKING FOR BANANA/ORANGE ==="
          if grep -q "BANANA" src/main/java/com/example/fruits/registry/FruitRegistry.java; then
            echo "❌ ERROR: BANANA found!"
            exit 1
          fi
          echo "✅ No BANANA found"
          
          if grep -q "Material.ORANGE" src/main/java/com/example/fruits/registry/FruitRegistry.java; then
            echo "❌ ERROR: ORANGE found!"
            exit 1
          fi
          echo "✅ No ORANGE found"

      - name: 📦 Build
        run: mvn -B clean package

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: FruitsPlugin
          path: target/*.jar
