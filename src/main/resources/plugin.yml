name: FruitsPlugin
version: 1.0.0
main: com.example.fruits.FruitsPlugin
api-version: "1.21"

commands:
  fruit:
    description: Use fruit abilities
    usage: /fruit use <1|2|3>
  fruitadmin:
    description: Admin commands
    usage: /fruitadmin <give|spin|spinall|gui|reload>

permissions:
  fruits.admin:
    default: op
